events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location / {
            # พระเอกอยู่ตรงนี้: มันจะดักจับข้อมูลที่ถูกตัด แล้วเติม /reqform/ กลับเข้าไปก่อนส่งให้ Next.js
            proxy_pass http://ced-document-app:3000/reqform/;
            
            # ส่งต่อข้อมูลสำคัญจากมหา'ลัยเผื่อ Next.js ต้องใช้
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}